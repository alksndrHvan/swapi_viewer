<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>SWAPI Viewer</title>
    <!-- Подключаем Materialize CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <!-- Подключаем иконки Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Подключаем наш стиль -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Навигация -->
    <nav>
        <div class="nav-wrapper">
            <a href="#!" class="brand-logo center">SWAPI Viewer</a>
        </div>
    </nav>

    <!-- Контейнер для контента -->
    <div class="container">
        <!-- Вкладки -->
        <ul id="tabs" class="tabs">
            <li class="tab"><a href="#films">Films</a></li>
            <li class="tab"><a href="#people">People</a></li>
            <li class="tab"><a href="#vehicles">Vehicles</a></li>
            <li class="tab"><a href="#manual-request">Manual Request</a></li>
        </ul>

        <!-- Секции для контента каждой вкладки -->
        <div id="films" class="col s12">
            <!-- Контент фильмов будет загружаться сюда -->
        </div>
        <div id="people" class="col s12">
            <!-- Контент персонажей будет загружаться сюда -->
        </div>
        <div id="vehicles" class="col s12">
            <!-- Контент транспортных средств будет загружаться сюда -->
        </div>
        <div id="manual-request" class="col s12">
            <!-- Контент для ручного запроса -->
            <div class="row">
                <div class="input-field col s12 m4">
                    <select id="category-select">
                        <option value="" disabled selected>Choose category</option>
                        <option value="films">Films</option>
                        <option value="people">People</option>
                        <option value="vehicles">Vehicles</option>
                    </select>
                    <label>Category</label>
                </div>
                <div class="input-field col s12 m4">
                    <input id="search-input" type="text">
                    <label for="search-input">Search by title</label>
                </div>
                <div class="input-field col s12 m2">
                    <input id="limit-input" type="number" min="1">
                    <label for="limit-input">Number of results</label>
                </div>
                <div class="input-field col s12 m2">
                    <button id="manual-request-button" class="btn waves-effect waves-light">Send Request</button>
                </div>
            </div>
            <div id="manual-content">
                <!-- Данные будут отображаться здесь -->
            </div>
        </div>
    </div>

    <!-- Подключаем jQuery и Materialize JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Не забудьте инициализировать select -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!-- Подключаем наш скрипт -->
    <script src="script.js"></script>
</body>
</html>
